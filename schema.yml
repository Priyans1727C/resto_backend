components:
  schemas:
    AccessTokenRefreshError:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    AccessTokenRefreshResponse:
      type: object
      properties:
        access:
          type: string
      required:
      - access
    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        cart_items:
          type: array
          items:
            type: string
            format: uuid
          readOnly: true
      required:
      - cart_items
      - created_at
      - id
      - updated_at
      - user
    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        cart:
          type: string
          format: uuid
          readOnly: true
        menu_item:
          type: integer
        item_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        item_price:
          type: number
          format: double
          readOnly: true
        total_price:
          type: number
          format: double
          readOnly: true
      required:
      - cart
      - id
      - item_name
      - item_price
      - menu_item
      - total_price
    CartItemRequest:
      type: object
      properties:
        menu_item:
          type: integer
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - menu_item
    CategoriesWithItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 150
          pattern: ^[-a-zA-Z0-9_]+$
        items:
          type: array
          items:
            $ref: '#/components/schemas/OnlyMenuItem'
          readOnly: true
      required:
      - id
      - items
      - name
    ChangePasswordError:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ChangePasswordResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    CreateOrder:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - order_id
      - status
      - total_amount
    ForgotPasswordResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    LogoutResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    MethodEnum:
      enum:
      - COD
      - ONLINE
      type: string
      description: |-
        * `COD` - Cash On Delivery
        * `ONLINE` - Online Payment
    OnlyCategories:
      type: object
      properties:
        restaurant:
          type: integer
        name:
          type: string
          maxLength: 150
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        items:
          type: array
          items:
            type: integer
          readOnly: true
      required:
      - items
      - name
      - restaurant
      - slug
    OnlyCategoriesRequest:
      type: object
      properties:
        restaurant:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 150
      required:
      - name
      - restaurant
    OnlyMenuItem:
      type: object
      properties:
        category:
          type: integer
        name:
          type: string
          maxLength: 150
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          maxLength: 270
        is_available:
          type: boolean
        serving_size:
          type: string
          description: 1/peice
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
        image:
          type: string
          format: uri
          nullable: true
      required:
      - category
      - name
      - price
      - slug
    OnlyMenuItemRequest:
      type: object
      properties:
        category:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 150
        description:
          type: string
          maxLength: 270
        is_available:
          type: boolean
        serving_size:
          type: string
          description: 1/peice
          maxLength: 100
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
        image:
          type: string
          format: binary
          nullable: true
