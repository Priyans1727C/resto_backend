openapi: 3.0.3
info:
  title: RESTO BACKEND API
  version: 1.0.0
  description: Backend REST API for the restaurant platform.
paths:
  /api/v1/auth/change-password/:
    post:
      operationId: v1_auth_change_password_create
      summary: Change password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordError'
          description: ''
  /api/v1/auth/forgot-password/:
    post:
      operationId: v1_auth_forgot_password_create
      summary: Request password reset
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserEmailRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Login
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RoleTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoleTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      summary: Logout
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
