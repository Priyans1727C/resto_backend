        name: categories_slug
        schema:
          type: string
        description: Category slug (only present on nested routes).
        required: true
      - in: query
        name: description
        schema:
          type: string
      - in: query
        name: description__contains
        schema:
          type: string
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: name__contains
        schema:
          type: string
      - name: page
