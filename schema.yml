  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Reads `refresh_token` from cookies and returns a new access token.
      summary: Refresh access token (uses refresh cookie)
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
